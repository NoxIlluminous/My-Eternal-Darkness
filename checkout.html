<main>
<!-- Shared styles (includes form styles) -->
<!-- MOBILE MENU TOGGLE: shown on mobile only; desktop/tablet keep the normal navigation 
visible -->
<input class="menu-toggle" type="checkbox" id="menu-toggle" aria-label="Toggle navigation 
menu">
<!-- PAGE INTRO -->
<section>
<h1>Checkout Page</h1>
<p>Fill in your details and Submit.</p>
</section>
<!-- CHECKOUT FORM -->
<section>
<form action="#" method="post">
        
<!-- action="#" means no server; method="post" sends data in request body -->
  <!-- FIELDSET 1: Account details -->
       <fieldset>
              <legend>Creating an Account</legend>  <!-- Fieldset title -->
          <div class="form-grid">
 
            <div class="field-group">
              <label for="username">Username Name</label>
              <input type="text" id="username" name="username"
                     placeholder="e.g. Darklord" required>
            </div>
 
            <div class="field-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email"
                    placeholder="eternal-darkness.com" required>
                </div>
 
                <div class="field-group">
                  <label for="password">Password</label>
                  <input type="password" id="password" name="password" required>
                  <!-- type="password" hides characters as typed -->
                </div>
     
                <div class="field-group">
                  <label for="confirm_password">Confirm Password</label>
                  <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
     
              </div>
            </fieldset>
     
            <!-- FIELDSET 2: Personal details -->
           <fieldset>
              <legend> Infomation</legend>
              <div class="form-grid">
     
                <div class="field-group">
                  <label for="first_name">First Name</label>
                  <input type="text" id="first_name" name="first_name" required>
                </div>
     
                <div class="field-group">
                  <label for="last_name">Last Name</label>
                  <input type="text" id="last_name" name="last_name" required>
                </div>
     
                <div class="field-group full">  <!-- full = span both columns -->
                  <span>Gender</span>           <!-- span used here instead of label (no paired 
    input) -->
                  <div class="inline-options">   <!-- Styled in checkout.css: flexbox row -->
                    <!-- Radio buttons: same name= means only one can be selected -->
                    <label><input type="radio" name="gender" value="male" required> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                    <label><input type="radio" name="gender" value="other"> Neutral 
    </label>
                  </div>
                </div>
</div>
       </fieldset>
 
        <!-- FIELDSET 3: Shipping address -->
        <fieldset>
          <legend>Delivery Location</legend>
          <div class="form-grid">
 
            <div class="field-group full">
              <label for="street">Street Address</label>
              <input type="text" id="street" name="street" required>
            </div>
 
            <div class="field-group">
              <label for="suburb">Suburb</label>
              <input type="text" id="suburb" name="suburb" required>
            </div>
 
            <div class="field-group">
              <label for="postcode">Postcode</label>
              <input type="text" id="postcode" name="postcode"
                     pattern="[0-9]{4}" placeholder="4 digits" required>
              <!-- pattern validates exactly 4 digits before submission -->
            </div>
 
            <div class="field-group">
              <label for="state">State</label>
              <select id="state" name="state" required>  <!-- Dropdown list -->
                <option value="">Select state…</option>   <!-- Empty value = nothing selected -->
                <option value="VIC">VIC</option>
                <option value="NSW">NSW</option>
                <option value="QLD">QLD</option>
                <option value="WA">WA</option>
                <option value="SA">SA</option>
                <option value="TAS">TAS</option>
                <option value="ACT">ACT</option>
                <option value="NT">NT</option>
              </select>
            </div>
 
            <div class="field-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" required>
              <!-- type="tel" shows number keypad on mobile -->
            </div>
 
            <div class="field-group full">
              <label for="order_notes">Order Notes (optional)</label>
              <textarea id="order_notes" name="order_notes"
                        placeholder=""></textarea>
              <!-- No required attribute = field is optional -->
            </div>
 
          </div>
        </fieldset>
        <footer>
          <!-- Clears all fields -->
          <p>&copy; 2026 Eternal-Darkness &mdash; Gothic Lolita Fashion Enthusiast Store</p>
          
      </footer>
